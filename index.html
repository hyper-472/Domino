<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Mexican Train" />
  <title>Mexican Train</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
    body { background: #000; color: #fff; font-family: 'Barlow Condensed', Arial Narrow, Arial, sans-serif; }
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const C = {
  bg:     '#000000',
  card:   '#111111',
  border: '#333333',
  yellow: '#FFE000',
  white:  '#FFFFFF',
  muted:  '#888888',
  green:  '#00E060',
  red:    '#FF4040',
  dimred: '#1a0000',
};
const F = "'Barlow Condensed', 'Arial Narrow', Arial, sans-serif";

const s = {
  app: { minHeight:'100vh', background:C.bg, color:C.white, fontFamily:F, display:'flex', flexDirection:'column', alignItems:'center', paddingBottom:40 },
  header: { width:'100%', padding:'14px 16px 12px', textAlign:'center', borderBottom:`2px solid ${C.yellow}`, background:'#000' },
  title: { fontSize:34, fontWeight:900, color:C.yellow, letterSpacing:2, textTransform:'uppercase' },
  sub: { fontSize:13, color:C.muted, letterSpacing:4, textTransform:'uppercase', marginTop:2 },
  card: { background:C.card, border:`2px solid ${C.border}`, borderRadius:12, padding:16, margin:'12px 10px 0', width:'calc(100% - 20px)', maxWidth:420 },
  label: { fontSize:12, letterSpacing:3, textTransform:'uppercase', color:C.muted, marginBottom:6, display:'block' },
  sectionTitle: { fontSize:30, fontWeight:900, color:C.white, textTransform:'uppercase', letterSpacing:1 },
  input: { background:'#000', border:`2px solid ${C.yellow}`, borderRadius:8, color:C.white, padding:'13px 14px', fontSize:20, fontWeight:700, width:'100%', fontFamily:F, outline:'none' },
  btn: (disabled) => ({ background: disabled ? '#222' : C.yellow, border:'none', borderRadius:10, color: disabled ? C.muted : '#000', padding:'17px 20px', fontSize:22, fontWeight:900, fontFamily:F, cursor: disabled ? 'default':'pointer', width:'100%', marginTop:10, letterSpacing:1, textTransform:'uppercase' }),
  btnGhost: { background:'transparent', border:`2px solid ${C.border}`, borderRadius:10, color:C.muted, padding:'15px 20px', fontSize:19, fontWeight:700, fontFamily:F, cursor:'pointer', width:'100%', marginTop:8, textTransform:'uppercase', letterSpacing:1 },
  btnRed: { background:C.dimred, border:`2px solid ${C.red}`, borderRadius:10, color:C.red, padding:'15px 20px', fontSize:19, fontWeight:700, fontFamily:F, cursor:'pointer', width:'100%', marginTop:10, textTransform:'uppercase', letterSpacing:1 },
  scoreRow: { display:'flex', justifyContent:'space-between', alignItems:'center', padding:'13px 0', borderBottom:`1px solid ${C.border}` },
  segBtn: (active) => ({ flex:1, background: active ? C.yellow : '#1a1a1a', border:`2px solid ${active ? C.yellow : C.border}`, borderRadius:8, color: active ? '#000' : C.muted, padding:'13px 0', fontSize:20, fontWeight:900, fontFamily:F, cursor:'pointer', letterSpacing:1 }),
};

const VISION_PROMPT = `This image shows domino tiles belonging to one player at the end of a round. This is a Mexican Train double-12 set.

TILE DETAILS:
- Each tile has two halves. Each half can show 0 to 12 pips.
- The pips are color-coded by value. Use the colors as a counting aid.

SCORING RULES — apply exactly:
1. Normally: count the pip dots on each half (0–12) and sum them.
2. EXCEPTION A: blank half (0 pips) = 25 points for that half.
3. EXCEPTION B: both halves identical (double) = exactly 50 points for that tile.

Return ONLY the total as a single integer. Nothing else.`;

function Modal({ title, message, onConfirm, onCancel }) {
  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.92)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:999, padding:16 }}>
      <div style={{ background:'#111', border:`2px solid ${C.red}`, borderRadius:12, padding:24, width:'100%', maxWidth:380 }}>
        <div style={{ fontSize:26, fontWeight:900, textTransform:'uppercase', letterSpacing:1, marginBottom:10 }}>{title}</div>
        <div style={{ fontSize:17, color:C.muted, lineHeight:1.5, marginBottom:24 }}>{message}</div>
        <button style={s.btn(false)} onClick={onConfirm}>Ja, beenden</button>
        <button style={s.btnGhost} onClick={onCancel}>Weiter spielen</button>
      </div>
    </div>
  );
}

function Dots({ total, current }) {
  return (
    <div style={{ display:'flex', gap:6, alignItems:'center' }}>
      {Array.from({ length: Math.min(total, 10) }).map((_, i) => (
        <div key={i} style={{ width:10, height:10, borderRadius:'50%', background: i < current ? C.yellow : i === current ? C.white : C.border }} />
      ))}
    </div>
  );
}

// ── API KEY SCREEN ──
function ApiKeyScreen({ onSave }) {
  const [key, setKey] = useState('');
  return (
    <div style={s.card}>
      <div style={{ ...s.sectionTitle, marginBottom:8 }}>API-Key</div>
      <div style={{ fontSize:17, color:C.muted, lineHeight:1.6, marginBottom:20 }}>
        Einmalig eingeben. Der Key wird nur auf diesem Gerät gespeichert und nirgendwo übertragen.
      </div>
      <div style={{ fontSize:14, color:C.muted, lineHeight:1.7, background:'#000', border:`1px solid ${C.border}`, borderRadius:8, padding:12, marginBottom:16 }}>
        <span style={{ color:C.yellow, fontWeight:900 }}>Wo bekomme ich den Key?</span><br />
        1. console.anthropic.com aufrufen<br />
        2. Registrieren / einloggen<br />
        3. „API Keys" → „Create Key"<br />
        4. Den Key hier einfügen
      </div>
      <input
        style={{ ...s.input, fontSize:15, letterSpacing:1 }}
        placeholder="sk-ant-..."
        value={key}
        onChange={e => setKey(e.target.value)}
        type="password"
      />
      <button style={s.btn(!key.startsWith('sk-'))} disabled={!key.startsWith('sk-')} onClick={() => { localStorage.setItem('mt_apikey', key); onSave(key); }}>
        Speichern & loslegen →
      </button>
    </div>
  );
}

// ── MAIN APP ──
function App() {
  const [apiKey, setApiKey] = useState(() => localStorage.getItem('mt_apikey') || '');
  const [phase, setPhase] = useState('setup');
  const [numPlayers, setNumPlayers] = useState(4);
  const [playerNames, setPlayerNames] = useState(['','','','','','']);
  const [currentRound, setCurrentRound] = useState(1);
  const [allRoundScores, setAllRoundScores] = useState([]);
  const [currentRoundScores, setCurrentRoundScores] = useState({});
  const [capturingIdx, setCapturingIdx] = useState(0);
  const [capturedImage, setCapturedImage] = useState(null);
  const [isAnalyzing, setIsAnalyzing] = useState(false);
  const [manualScore, setManualScore] = useState('');
  const [analysisError, setAnalysisError] = useState(null);
  const [playerChoice, setPlayerChoice] = useState(null);
  const [showEndModal, setShowEndModal] = useState(false);
  const fileInputRef = useRef();

  const getNames = () => playerNames.slice(0, numPlayers).map((n, i) => n.trim() || `Spieler ${i+1}`);
  const getTotals = (scores = allRoundScores) =>
    getNames().map((name, idx) => ({ name, idx, total: scores.reduce((s, r) => s + (r[idx] ?? 0), 0) }));
  const names = getNames();

  const advanceCapturing = (newScores) => {
    const nextIdx = capturingIdx + 1;
    if (nextIdx < names.length) {
      setCapturingIdx(nextIdx);
      setCurrentRoundScores(newScores);
      setCapturedImage(null); setManualScore(''); setAnalysisError(null); setPlayerChoice(null);
    } else {
      setAllRoundScores(prev => [...prev, newScores]);
      setCurrentRoundScores({});
      setPhase('round_summary');
    }
  };

  const confirmZero = () => advanceCapturing({ ...currentRoundScores, [capturingIdx]: 0 });

  const confirmScore = () => {
    const score = parseInt(manualScore, 10);
    if (isNaN(score) || score < 0) return;
    advanceCapturing({ ...currentRoundScores, [capturingIdx]: score });
  };

  const handleFileChange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    e.target.value = '';
    const reader = new FileReader();
    reader.onload = async (ev) => {
      const dataUrl = ev.target.result;
      setCapturedImage(dataUrl);
      setIsAnalyzing(true); setAnalysisError(null); setManualScore('');
      const base64 = dataUrl.split(',')[1];
      const mediaType = dataUrl.split(';')[0].split(':')[1];
      try {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 150,
            messages: [{ role:'user', content:[
              { type:'image', source:{ type:'base64', media_type: mediaType, data: base64 } },
              { type:'text', text: VISION_PROMPT }
            ]}]
          })
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error.type + ': ' + data.error.message);
        const text = data.content?.map(c => c.text||'').join('').trim();
        setAnalysisError('KI antwortete: ' + text);
        const match = text.match(/\d+/g);
        const score = match ? parseInt(match[match.length-1], 10) : NaN;
        if (!isNaN(score)) { setManualScore(String(score)); setAnalysisError(null); }
        else setAnalysisError('Nicht erkannt. KI sagte: ' + text);
      } catch(err) {
        setAnalysisError('Fehler: ' + err.message);
        console.error(err);
      }
      setIsAnalyzing(false);
    };
    reader.readAsDataURL(file);
  };

  const startGame = () => {
    setAllRoundScores([]); setCurrentRound(1); setCapturingIdx(0);
    setCurrentRoundScores({}); setCapturedImage(null);
    setManualScore(''); setAnalysisError(null); setPlayerChoice(null);
    setPhase('capturing');
  };

  const nextRound = () => {
    setCurrentRound(r => r+1); setCapturingIdx(0);
    setCurrentRoundScores({}); setCapturedImage(null);
    setManualScore(''); setAnalysisError(null); setPlayerChoice(null);
    setPhase('capturing');
  };

  const EndBtn = () => (
    <div style={{ marginTop:20, paddingTop:16, borderTop:`1px solid ${C.border}` }}>
      <button style={s.btnRed} onClick={() => setShowEndModal(true)}>⬛ Spiel beenden</button>
    </div>
  );

  if (!apiKey) return (
    <div style={s.app}>
      <div style={s.header}><div style={s.title}>⬛ Mexican Train</div><div style={s.sub}>Punktezähler</div></div>
      <ApiKeyScreen onSave={setApiKey} />
    </div>
  );

  return (
    <div style={s.app}>
      <input ref={fileInputRef} type="file" accept="image/*" capture="environment" style={{ display:'none' }} onChange={handleFileChange} />

      {showEndModal && (
        <Modal
          title="Spiel beenden?"
          message={`${currentRound} Runde${currentRound!==1?'n':''} gespielt. Endstand wird ermittelt.`}
          onConfirm={() => { setShowEndModal(false); setPhase('final'); }}
          onCancel={() => setShowEndModal(false)}
        />
      )}

      <div style={s.header}>
        <div style={s.title}>⬛ Mexican Train</div>
        <div style={s.sub}>Punktezähler</div>
      </div>

      {/* SETUP */}
      {phase === 'setup' && (
        <div style={s.card}>
          <div style={{ ...s.sectionTitle, marginBottom:16 }}>Neues Spiel</div>
          <label style={s.label}>Spieler</label>
          <div style={{ display:'flex', gap:6, marginBottom:16 }}>
            {[2,3,4,5,6].map(n => (
              <button key={n} style={s.segBtn(n===numPlayers)} onClick={() => setNumPlayers(n)}>{n}</button>
            ))}
          </div>
          {Array.from({ length: numPlayers }).map((_, i) => (
            <input key={i} style={{ ...s.input, marginBottom:8 }}
              placeholder={`Spieler ${i+1}`} value={playerNames[i]}
              onChange={e => { const n=[...playerNames]; n[i]=e.target.value; setPlayerNames(n); }}
            />
          ))}
          <div style={{ background:'#000', border:`1px solid ${C.border}`, borderRadius:8, padding:12, fontSize:14, color:C.muted, lineHeight:1.8, marginTop:4 }}>
            <span style={{ color:C.yellow, fontWeight:900 }}>SONDERWERTUNG · </span>
            Leere Hälfte → 25 Pkt · Doppelstein → 50 Pkt
          </div>
          <button style={s.btn(false)} onClick={startGame}>Starten →</button>
          <button style={s.btnGhost} onClick={() => { localStorage.removeItem('mt_apikey'); setApiKey(''); }}>
            API-Key ändern
          </button>
        </div>
      )}

      {/* CAPTURING */}
      {phase === 'capturing' && (
        <div style={s.card}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10 }}>
            <span style={{ fontSize:15, color:C.muted, fontWeight:700, letterSpacing:2, textTransform:'uppercase' }}>Runde {currentRound}</span>
            <Dots total={names.length} current={capturingIdx} />
          </div>
          <div style={{ fontSize:40, fontWeight:900, color:C.yellow, lineHeight:1, textTransform:'uppercase', marginBottom:14 }}>
            {names[capturingIdx]}
          </div>

          {!playerChoice && (
            <div style={{ display:'flex', gap:10 }}>
              <button onClick={confirmZero}
                style={{ flex:1, background:'#001a0d', border:`3px solid ${C.green}`, borderRadius:10, padding:'22px 0', cursor:'pointer', display:'flex', flexDirection:'column', alignItems:'center', gap:6 }}>
                <span style={{ fontSize:50, fontWeight:900, color:C.green, fontFamily:F, lineHeight:1 }}>0</span>
                <span style={{ fontSize:13, color:C.green, fontWeight:700, letterSpacing:2, textTransform:'uppercase' }}>Keine Punkte</span>
              </button>
              <button onClick={() => setPlayerChoice('photo')}
                style={{ flex:1, background:'#1a1400', border:`3px solid ${C.yellow}`, borderRadius:10, padding:'22px 0', cursor:'pointer', display:'flex', flexDirection:'column', alignItems:'center', gap:6 }}>
                <span style={{ fontSize:42, lineHeight:1 }}>📷</span>
                <span style={{ fontSize:13, color:C.yellow, fontWeight:700, letterSpacing:2, textTransform:'uppercase' }}>Foto</span>
              </button>
            </div>
          )}

          {playerChoice === 'photo' && (
            <>
              {capturedImage && (
                <img src={capturedImage} alt="" style={{ width:'100%', borderRadius:8, marginBottom:12, objectFit:'cover', maxHeight:190, display:'block' }} />
              )}
              {isAnalyzing && (
                <div style={{ textAlign:'center', padding:'28px 0', fontSize:22, color:C.yellow, fontWeight:900, letterSpacing:2 }}>⏳ KI ZÄHLT…</div>
              )}
              {analysisError && !isAnalyzing && (
                <div style={{ background:C.dimred, border:`2px solid ${C.red}`, borderRadius:8, padding:'12px 14px', fontSize:17, color:C.red, fontWeight:700, marginBottom:10 }}>
                  ⚠ {analysisError}
                </div>
              )}
              {!capturedImage && !isAnalyzing && (
                <>
                  <button style={s.btn(false)} onClick={() => fileInputRef.current.click()}>📷 Foto aufnehmen</button>
                  <button style={s.btnGhost} onClick={() => setPlayerChoice(null)}>← Zurück</button>
                </>
              )}
              {capturedImage && !isAnalyzing && (
                <>
                  <label style={{ ...s.label, marginTop:4 }}>Punkte – bitte prüfen</label>
                  <input
                    style={{ ...s.input, textAlign:'center', fontSize:54, fontWeight:900, padding:'12px', letterSpacing:0 }}
                    type="number" inputMode="numeric"
                    value={manualScore} onChange={e => setManualScore(e.target.value)}
                    placeholder="?"
                  />
                  <button style={s.btn(manualScore==='')} onClick={confirmScore} disabled={manualScore===''}>
                    {capturingIdx+1 < names.length ? `Weiter → ${names[capturingIdx+1]}` : 'Runde fertig ✓'}
                  </button>
                  <button style={s.btnGhost} onClick={() => { setCapturedImage(null); setManualScore(''); setAnalysisError(null); }}>
                    Neu aufnehmen
                  </button>
                </>
              )}
            </>
          )}
          <EndBtn />
        </div>
      )}

      {/* ROUND SUMMARY */}
      {phase === 'round_summary' && (() => {
        const lastRound = allRoundScores[allRoundScores.length-1];
        const sorted = [...getTotals()].sort((a,b) => a.total-b.total);
        return (
          <div style={s.card}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:14 }}>
              <div style={s.sectionTitle}>Runde {currentRound}</div>
              <span style={{ fontSize:13, color:C.muted, fontWeight:700, letterSpacing:2, textTransform:'uppercase' }}>Fertig</span>
            </div>
            <label style={s.label}>Diese Runde</label>
            {names.map((name, idx) => (
              <div key={idx} style={s.scoreRow}>
                <span style={{ fontSize:22, fontWeight:700 }}>{name}</span>
                <span style={{ fontSize:30, fontWeight:900, color: lastRound[idx]===0 ? C.green : C.yellow }}>
                  {lastRound[idx]===0 ? '🏆 0' : `+${lastRound[idx]}`}
                </span>
              </div>
            ))}
            <div style={{ marginTop:16 }}>
              <label style={s.label}>Gesamtstand</label>
              {sorted.map((p, rank) => (
                <div key={p.idx} style={s.scoreRow}>
                  <span style={{ fontSize:22, fontWeight:700, color: rank===0 ? C.white : C.muted }}>{rank+1}. {p.name}</span>
                  <span style={{ fontSize:30, fontWeight:900, color: rank===0 ? C.green : C.muted }}>{p.total}</span>
                </div>
              ))}
            </div>
            <button style={s.btn(false)} onClick={nextRound}>Runde {currentRound+1} →</button>
            <button style={s.btnRed} onClick={() => setShowEndModal(true)}>⬛ Spiel beenden</button>
          </div>
        );
      })()}

      {/* FINAL */}
      {phase === 'final' && (() => {
        const sorted = [...getTotals()].sort((a,b) => a.total-b.total);
        const medals = ['🥇','🥈','🥉'];
        return (
          <div style={s.card}>
            <div style={{ textAlign:'center', borderBottom:`2px solid ${C.yellow}`, paddingBottom:16, marginBottom:16 }}>
              <div style={{ fontSize:13, color:C.muted, letterSpacing:4, textTransform:'uppercase', marginBottom:6 }}>Sieger</div>
              <div style={{ fontSize:42, fontWeight:900, color:C.yellow, textTransform:'uppercase' }}>{sorted[0].name}</div>
              <div style={{ fontSize:90, fontWeight:900, color:C.yellow, lineHeight:1 }}>{sorted[0].total}</div>
              <div style={{ fontSize:14, color:C.muted, letterSpacing:2, textTransform:'uppercase' }}>{currentRound} Runden</div>
            </div>
            {sorted.map((p, rank) => (
              <div key={p.idx} style={s.scoreRow}>
                <span style={{ fontSize:22, fontWeight:700, color: rank===0 ? C.yellow : rank<3 ? C.white : C.muted }}>
                  {medals[rank]||`${rank+1}.`} {p.name}
                </span>
                <div style={{ textAlign:'right' }}>
                  <div style={{ fontSize:28, fontWeight:900, color: rank===0 ? C.yellow : C.white }}>{p.total}</div>
                  <div style={{ fontSize:11, color:C.muted }}>
                    {allRoundScores.map((r,ri) => <span key={ri} style={{ marginLeft:4 }}>{r[p.idx]??'–'}</span>)}
                  </div>
                </div>
              </div>
            ))}
            <button style={{ ...s.btn(false), marginTop:20 }}
              onClick={() => { setPhase('setup'); setAllRoundScores([]); setCurrentRound(1); setCapturedImage(null); setManualScore(''); }}>
              Neues Spiel
            </button>
          </div>
        );
      })()}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
