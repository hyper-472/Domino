<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Mexican Train" />
  <title>Mexican Train</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
    body { background: #000; color: #fff; font-family: 'Barlow Condensed', Arial, sans-serif; overscroll-behavior: none; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const C = {
  bg:     '#000',
  card:   '#111',
  border: '#333',
  yellow: '#FFE000',
  white:  '#FFF',
  muted:  '#777',
  green:  '#00E060',
  red:    '#FF4040',
  dimred: '#1a0000',
};
const F = "'Barlow Condensed', Arial, sans-serif";

// Score a single tile given two half-values
function scoreTile(a, b) {
  if (a === null || b === null) return null;
  if (a === b) return 50;                      // double → always 50
  const sa = a === 0 ? 25 : a;                 // blank half → 25
  const sb = b === 0 ? 25 : b;
  return sa + sb;
}

// ── PIP PICKER ──────────────────────────────────────────────────────────────
// Shows 0–12 as a grid of tap targets, highlights selected value
function PipGrid({ value, onSelect, color }) {
  return (
    <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:5 }}>
      {Array.from({length:13},(_,i)=>i).map(n => {
        const selected = value === n;
        return (
          <button key={n} onClick={() => onSelect(n)} style={{
            background: selected ? color : '#1a1a1a',
            border: `2px solid ${selected ? color : C.border}`,
            borderRadius: 8,
            color: selected ? '#000' : C.muted,
            fontSize: 20, fontWeight: 900, fontFamily: F,
            padding: '10px 0', cursor: 'pointer',
            transition: 'all 0.1s',
          }}>{n}</button>
        );
      })}
    </div>
  );
}

// ── TILE ENTRY ───────────────────────────────────────────────────────────────
function TileEntry({ tile, idx, onRemove }) {
  const score = scoreTile(tile.a, tile.b);
  const isDouble = tile.a !== null && tile.b !== null && tile.a === tile.b;
  const hasBlank = (tile.a === 0 || tile.b === 0) && !isDouble;
  return (
    <div style={{
      display:'flex', alignItems:'center', justifyContent:'space-between',
      padding:'10px 0', borderBottom:`1px solid ${C.border}`
    }}>
      <div style={{ display:'flex', alignItems:'center', gap:10 }}>
        <span style={{ fontSize:13, color:C.muted, fontWeight:700, minWidth:20 }}>{idx+1}.</span>
        <div style={{
          display:'flex', alignItems:'center', gap:6,
          background:'#1a1a1a', border:`1px solid ${C.border}`,
          borderRadius:8, padding:'6px 12px'
        }}>
          <span style={{ fontSize:24, fontWeight:900, color: tile.a===0 ? C.yellow : C.white }}>
            {tile.a ?? '?'}
          </span>
          <span style={{ fontSize:16, color:C.muted }}>|</span>
          <span style={{ fontSize:24, fontWeight:900, color: tile.b===0 ? C.yellow : C.white }}>
            {tile.b ?? '?'}
          </span>
        </div>
        {isDouble && <span style={{ fontSize:12, color:C.yellow, fontWeight:700, letterSpacing:1 }}>DOPPEL</span>}
        {hasBlank && <span style={{ fontSize:12, color:C.yellow, fontWeight:700, letterSpacing:1 }}>BLANK</span>}
      </div>
      <div style={{ display:'flex', alignItems:'center', gap:10 }}>
        <span style={{ fontSize:26, fontWeight:900, color: score!==null ? C.green : C.muted }}>
          {score ?? '–'}
        </span>
        <button onClick={onRemove} style={{
          background:'transparent', border:`1px solid ${C.border}`,
          borderRadius:6, color:C.muted, fontSize:18, fontFamily:F,
          padding:'4px 10px', cursor:'pointer'
        }}>✕</button>
      </div>
    </div>
  );
}

// ── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [phase, setPhase] = useState('setup');
  const [numPlayers, setNumPlayers] = useState(4);
  const [playerNames, setPlayerNames] = useState(['','','','','','']);
  const [currentRound, setCurrentRound] = useState(1);
  const [allRoundScores, setAllRoundScores] = useState([]);   // [{0:12, 1:34, ...}, ...]
  const [capturingIdx, setCapturingIdx] = useState(0);
  const [tiles, setTiles] = useState([{a:null,b:null}]);     // tiles for current player
  const [pickingHalf, setPickingHalf] = useState('a');       // which half is being picked
  const [activeTile, setActiveTile] = useState(0);           // which tile is active
  const [roundScores, setRoundScores] = useState({});
  const [showEndModal, setShowEndModal] = useState(false);

  const getNames = () => playerNames.slice(0, numPlayers).map((n,i) => n.trim() || `Spieler ${i+1}`);
  const names = getNames();

  const getTotals = (scores = allRoundScores) =>
    names.map((name, idx) => ({
      name, idx,
      total: scores.reduce((s, r) => s + (r[idx] ?? 0), 0)
    }));

  const totalForTiles = (ts) =>
    ts.reduce((sum, t) => sum + (scoreTile(t.a, t.b) ?? 0), 0);

  const startGame = () => {
    setAllRoundScores([]); setCurrentRound(1);
    setCapturingIdx(0); setRoundScores({});
    setTiles([{a:null,b:null}]); setPickingHalf('a'); setActiveTile(0);
    setPhase('picking');
  };

  const resetPicker = () => {
    setTiles([{a:null,b:null}]);
    setPickingHalf('a');
    setActiveTile(0);
  };

  const handlePip = (n) => {
    const updated = tiles.map((t,i) => {
      if (i !== activeTile) return t;
      return pickingHalf === 'a' ? {...t, a:n} : {...t, b:n};
    });
    setTiles(updated);
    // auto-advance: if picking 'a', move to 'b'; if 'b' is done, stay (user confirms)
    if (pickingHalf === 'a') setPickingHalf('b');
  };

  const addTile = () => {
    setTiles(prev => [...prev, {a:null,b:null}]);
    setActiveTile(tiles.length);
    setPickingHalf('a');
  };

  const removeTile = (idx) => {
    if (tiles.length === 1) { setTiles([{a:null,b:null}]); setPickingHalf('a'); setActiveTile(0); return; }
    const updated = tiles.filter((_,i) => i !== idx);
    setTiles(updated);
    const newActive = Math.min(activeTile, updated.length-1);
    setActiveTile(newActive);
    setPickingHalf('a');
  };

  const confirmPlayer = () => {
    const score = totalForTiles(tiles);
    const newRoundScores = {...roundScores, [capturingIdx]: score};
    const nextIdx = capturingIdx + 1;
    if (nextIdx < names.length) {
      setCapturingIdx(nextIdx);
      setRoundScores(newRoundScores);
      resetPicker();
    } else {
      setAllRoundScores(prev => [...prev, newRoundScores]);
      setRoundScores({});
      setPhase('round_summary');
    }
  };

  const confirmZero = () => {
    const newRoundScores = {...roundScores, [capturingIdx]: 0};
    const nextIdx = capturingIdx + 1;
    if (nextIdx < names.length) {
      setCapturingIdx(nextIdx);
      setRoundScores(newRoundScores);
      resetPicker();
    } else {
      setAllRoundScores(prev => [...prev, newRoundScores]);
      setRoundScores({});
      setPhase('round_summary');
    }
  };

  const nextRound = () => {
    setCurrentRound(r => r+1);
    setCapturingIdx(0); setRoundScores({});
    resetPicker();
    setPhase('picking');
  };

  const allTilesComplete = tiles.every(t => t.a !== null && t.b !== null);
  const running = totalForTiles(tiles);

  // ── btn styles ──
  const btn = (disabled) => ({
    background: disabled ? '#222' : C.yellow,
    border: 'none', borderRadius: 10,
    color: disabled ? C.muted : '#000',
    padding: '16px 20px', fontSize: 22, fontWeight: 900,
    fontFamily: F, cursor: disabled ? 'default' : 'pointer',
    width: '100%', marginTop: 10, letterSpacing: 1, textTransform: 'uppercase',
  });
  const btnGhost = {
    background: 'transparent', border: `2px solid ${C.border}`,
    borderRadius: 10, color: C.muted,
    padding: '14px 20px', fontSize: 19, fontWeight: 700,
    fontFamily: F, cursor: 'pointer', width: '100%',
    marginTop: 8, textTransform: 'uppercase', letterSpacing: 1,
  };
  const btnRed = {
    background: C.dimred, border: `2px solid ${C.red}`,
    borderRadius: 10, color: C.red,
    padding: '14px 20px', fontSize: 18, fontWeight: 700,
    fontFamily: F, cursor: 'pointer', width: '100%',
    marginTop: 10, textTransform: 'uppercase', letterSpacing: 1,
  };
  const segBtn = (active) => ({
    flex: 1, background: active ? C.yellow : '#1a1a1a',
    border: `2px solid ${active ? C.yellow : C.border}`,
    borderRadius: 8, color: active ? '#000' : C.muted,
    padding: '13px 0', fontSize: 20, fontWeight: 900,
    fontFamily: F, cursor: 'pointer', letterSpacing: 1,
  });
  const card = {
    background: C.card, border: `2px solid ${C.border}`,
    borderRadius: 12, padding: 16,
    margin: '12px 10px 0', width: 'calc(100% - 20px)', maxWidth: 440,
  };
  const label = {
    fontSize: 12, letterSpacing: 3, textTransform: 'uppercase',
    color: C.muted, marginBottom: 6, display: 'block',
  };

  return (
    <div style={{ minHeight:'100vh', background:C.bg, color:C.white, fontFamily:F, display:'flex', flexDirection:'column', alignItems:'center', paddingBottom:40 }}>

      {/* MODAL */}
      {showEndModal && (
        <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.92)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:999, padding:16 }}>
          <div style={{ background:'#111', border:`2px solid ${C.red}`, borderRadius:12, padding:24, width:'100%', maxWidth:380 }}>
            <div style={{ fontSize:26, fontWeight:900, textTransform:'uppercase', letterSpacing:1, marginBottom:10 }}>Spiel beenden?</div>
            <div style={{ fontSize:17, color:C.muted, lineHeight:1.5, marginBottom:24 }}>
              {currentRound} Runde{currentRound!==1?'n':''} gespielt. Endstand wird ermittelt.
            </div>
            <button style={btn(false)} onClick={() => { setShowEndModal(false); setPhase('final'); }}>Ja, beenden</button>
            <button style={btnGhost} onClick={() => setShowEndModal(false)}>Weiter spielen</button>
          </div>
        </div>
      )}

      {/* HEADER */}
      <div style={{ width:'100%', padding:'14px 16px 12px', textAlign:'center', borderBottom:`2px solid ${C.yellow}`, background:'#000' }}>
        <div style={{ fontSize:34, fontWeight:900, color:C.yellow, letterSpacing:2, textTransform:'uppercase' }}>⬛ Mexican Train</div>
        <div style={{ fontSize:13, color:C.muted, letterSpacing:4, textTransform:'uppercase', marginTop:2 }}>Punktezähler</div>
      </div>

      {/* ── SETUP ── */}
      {phase === 'setup' && (
        <div style={card}>
          <div style={{ fontSize:30, fontWeight:900, textTransform:'uppercase', marginBottom:16 }}>Neues Spiel</div>
          <label style={label}>Spieler</label>
          <div style={{ display:'flex', gap:6, marginBottom:16 }}>
            {[2,3,4,5,6].map(n => (
              <button key={n} style={segBtn(n===numPlayers)} onClick={() => setNumPlayers(n)}>{n}</button>
            ))}
          </div>
          {Array.from({length:numPlayers}).map((_,i) => (
            <input key={i}
              style={{ background:'#000', border:`2px solid ${C.yellow}`, borderRadius:8, color:C.white, padding:'12px 14px', fontSize:20, fontWeight:700, width:'100%', fontFamily:F, outline:'none', marginBottom:8 }}
              placeholder={`Spieler ${i+1}`} value={playerNames[i]}
              onChange={e => { const n=[...playerNames]; n[i]=e.target.value; setPlayerNames(n); }}
            />
          ))}
          <div style={{ background:'#000', border:`1px solid ${C.border}`, borderRadius:8, padding:12, fontSize:14, color:C.muted, lineHeight:1.8, marginTop:4 }}>
            <span style={{ color:C.yellow, fontWeight:900 }}>SONDERWERTUNG · </span>
            Leere Hälfte (0) → 25 Pkt · Doppelstein → 50 Pkt
          </div>
          <button style={btn(false)} onClick={startGame}>Starten →</button>
        </div>
      )}

      {/* ── PIP PICKER ── */}
      {phase === 'picking' && (
        <div style={card}>
          {/* Header row */}
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10 }}>
            <span style={{ fontSize:14, color:C.muted, fontWeight:700, letterSpacing:2, textTransform:'uppercase' }}>
              Runde {currentRound}
            </span>
            <div style={{ display:'flex', gap:5 }}>
              {names.map((_,i) => (
                <div key={i} style={{ width:9, height:9, borderRadius:'50%', background: i < capturingIdx ? C.yellow : i===capturingIdx ? C.white : C.border }} />
              ))}
            </div>
          </div>

          <div style={{ fontSize:40, fontWeight:900, color:C.yellow, textTransform:'uppercase', marginBottom:12, lineHeight:1 }}>
            {names[capturingIdx]}
          </div>

          {/* Zero button */}
          <button onClick={confirmZero} style={{
            width:'100%', background:'#001a0d', border:`3px solid ${C.green}`,
            borderRadius:10, padding:'14px', cursor:'pointer', marginBottom:14,
            display:'flex', alignItems:'center', justifyContent:'center', gap:12,
          }}>
            <span style={{ fontSize:36, fontWeight:900, color:C.green, fontFamily:F, lineHeight:1 }}>0</span>
            <span style={{ fontSize:16, color:C.green, fontWeight:700, letterSpacing:2, textTransform:'uppercase' }}>Keine Reststeine</span>
          </button>

          {/* Tiles added so far */}
          {tiles.length > 0 && tiles.some(t => t.a!==null || t.b!==null) && (
            <div style={{ marginBottom:10 }}>
              <label style={label}>Eingetragene Steine</label>
              {tiles.map((t,i) => (
                <TileEntry key={i} tile={t} idx={i} onRemove={() => removeTile(i)} />
              ))}
              <div style={{ display:'flex', justifyContent:'flex-end', paddingTop:8 }}>
                <span style={{ fontSize:14, color:C.muted, fontWeight:700, letterSpacing:2, textTransform:'uppercase', marginRight:10 }}>Gesamt</span>
                <span style={{ fontSize:28, fontWeight:900, color:C.green }}>{running}</span>
              </div>
            </div>
          )}

          {/* Active tile picker */}
          <div style={{ background:'#000', border:`2px solid ${C.yellow}`, borderRadius:10, padding:12, marginBottom:10 }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10 }}>
              <span style={{ fontSize:14, color:C.yellow, fontWeight:700, letterSpacing:2, textTransform:'uppercase' }}>
                Stein {activeTile+1}
              </span>
              <div style={{ display:'flex', gap:8 }}>
                <button
                  onClick={() => setPickingHalf('a')}
                  style={{ ...segBtn(pickingHalf==='a'), flex:'unset', padding:'6px 16px', fontSize:16 }}
                >Linke Hälfte</button>
                <button
                  onClick={() => setPickingHalf('b')}
                  style={{ ...segBtn(pickingHalf==='b'), flex:'unset', padding:'6px 16px', fontSize:16 }}
                >Rechte Hälfte</button>
              </div>
            </div>

            {/* Current tile preview */}
            <div style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:10, marginBottom:12 }}>
              <div style={{
                width:56, height:56, borderRadius:8,
                background: pickingHalf==='a' ? '#FFE00022' : '#1a1a1a',
                border: `2px solid ${pickingHalf==='a' ? C.yellow : C.border}`,
                display:'flex', alignItems:'center', justifyContent:'center',
              }}>
                <span style={{ fontSize:32, fontWeight:900, color: tiles[activeTile]?.a===0 ? C.yellow : C.white }}>
                  {tiles[activeTile]?.a ?? '?'}
                </span>
              </div>
              <span style={{ fontSize:24, color:C.muted }}>|</span>
              <div style={{
                width:56, height:56, borderRadius:8,
                background: pickingHalf==='b' ? '#FFE00022' : '#1a1a1a',
                border: `2px solid ${pickingHalf==='b' ? C.yellow : C.border}`,
                display:'flex', alignItems:'center', justifyContent:'center',
              }}>
                <span style={{ fontSize:32, fontWeight:900, color: tiles[activeTile]?.b===0 ? C.yellow : C.white }}>
                  {tiles[activeTile]?.b ?? '?'}
                </span>
              </div>
              {tiles[activeTile]?.a !== null && tiles[activeTile]?.b !== null && (
                <div style={{ marginLeft:8, textAlign:'right' }}>
                  <div style={{ fontSize:11, color:C.muted, letterSpacing:2, textTransform:'uppercase' }}>
                    {tiles[activeTile].a === tiles[activeTile].b ? 'Doppel' : tiles[activeTile].a===0||tiles[activeTile].b===0 ? 'Blank' : ''}
                  </div>
                  <div style={{ fontSize:28, fontWeight:900, color:C.green }}>
                    = {scoreTile(tiles[activeTile].a, tiles[activeTile].b)}
                  </div>
                </div>
              )}
            </div>

            <PipGrid value={pickingHalf==='a' ? tiles[activeTile]?.a : tiles[activeTile]?.b} onSelect={handlePip} color={C.yellow} />
          </div>

          <button style={btn(false)} onClick={addTile}>+ Weiteren Stein hinzufügen</button>

          <button style={btn(!allTilesComplete)} onClick={confirmPlayer} disabled={!allTilesComplete}>
            {capturingIdx+1 < names.length
              ? `${running} Pkt · Weiter → ${names[capturingIdx+1]}`
              : `${running} Pkt · Runde fertig ✓`}
          </button>

          <div style={{ marginTop:20, paddingTop:16, borderTop:`1px solid ${C.border}` }}>
            <button style={btnRed} onClick={() => setShowEndModal(true)}>⬛ Spiel beenden</button>
          </div>
        </div>
      )}

      {/* ── ROUND SUMMARY ── */}
      {phase === 'round_summary' && (() => {
        const lastRound = allRoundScores[allRoundScores.length-1];
        const sorted = [...getTotals()].sort((a,b) => a.total-b.total);
        return (
          <div style={card}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:14 }}>
              <div style={{ fontSize:30, fontWeight:900, textTransform:'uppercase' }}>Runde {currentRound}</div>
              <span style={{ fontSize:13, color:C.muted, fontWeight:700, letterSpacing:2, textTransform:'uppercase' }}>Fertig</span>
            </div>
            <label style={label}>Diese Runde</label>
            {names.map((name,idx) => (
              <div key={idx} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'13px 0', borderBottom:`1px solid ${C.border}` }}>
                <span style={{ fontSize:22, fontWeight:700 }}>{name}</span>
                <span style={{ fontSize:30, fontWeight:900, color: lastRound[idx]===0 ? C.green : C.yellow }}>
                  {lastRound[idx]===0 ? '🏆 0' : `+${lastRound[idx]}`}
                </span>
              </div>
            ))}
            <div style={{ marginTop:16 }}>
              <label style={label}>Gesamtstand</label>
              {sorted.map((p,rank) => (
                <div key={p.idx} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'13px 0', borderBottom:`1px solid ${C.border}` }}>
                  <span style={{ fontSize:22, fontWeight:700, color: rank===0 ? C.white : C.muted }}>{rank+1}. {p.name}</span>
                  <span style={{ fontSize:30, fontWeight:900, color: rank===0 ? C.green : C.muted }}>{p.total}</span>
                </div>
              ))}
            </div>
            <button style={btn(false)} onClick={nextRound}>Runde {currentRound+1} →</button>
            <button style={btnRed} onClick={() => setShowEndModal(true)}>⬛ Spiel beenden</button>
          </div>
        );
      })()}

      {/* ── FINAL ── */}
      {phase === 'final' && (() => {
        const sorted = [...getTotals()].sort((a,b) => a.total-b.total);
        const medals = ['🥇','🥈','🥉'];
        return (
          <div style={card}>
            <div style={{ textAlign:'center', borderBottom:`2px solid ${C.yellow}`, paddingBottom:16, marginBottom:16 }}>
              <div style={{ fontSize:13, color:C.muted, letterSpacing:4, textTransform:'uppercase', marginBottom:6 }}>Sieger</div>
              <div style={{ fontSize:42, fontWeight:900, color:C.yellow, textTransform:'uppercase' }}>{sorted[0].name}</div>
              <div style={{ fontSize:90, fontWeight:900, color:C.yellow, lineHeight:1 }}>{sorted[0].total}</div>
              <div style={{ fontSize:14, color:C.muted, letterSpacing:2, textTransform:'uppercase' }}>{currentRound} Runden</div>
            </div>
            {sorted.map((p,rank) => (
              <div key={p.idx} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'13px 0', borderBottom:`1px solid ${C.border}` }}>
                <span style={{ fontSize:22, fontWeight:700, color: rank===0 ? C.yellow : rank<3 ? C.white : C.muted }}>
                  {medals[rank]||`${rank+1}.`} {p.name}
                </span>
                <div style={{ textAlign:'right' }}>
                  <div style={{ fontSize:28, fontWeight:900, color: rank===0 ? C.yellow : C.white }}>{p.total}</div>
                  <div style={{ fontSize:11, color:C.muted }}>
                    {allRoundScores.map((r,ri) => <span key={ri} style={{ marginLeft:4 }}>{r[p.idx]??'–'}</span>)}
                  </div>
                </div>
              </div>
            ))}
            <button style={{ ...btn(false), marginTop:20 }}
              onClick={() => { setPhase('setup'); setAllRoundScores([]); setCurrentRound(1); }}>
              Neues Spiel
            </button>
          </div>
        );
      })()}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
